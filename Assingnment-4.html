<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1><u>Student Registration Form</u></h1>
    <table border="3" width="50%">
        <form>
            <tr>
            <td>
                <label>First Name</label>
            </td>
            <td>
                <input type="text" type="text" placeholder="Enter Your First Name Here" min="1" max="50" />
            </td>
            </tr>
            <tr>
                <td>
                    <label>Last Name</label>
                </td>
                <td>
                    <input type="text" type="text" placeholder="Enter Your Last Name Here" min="1" max="50" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Email ID</label>
                </td>
                <td>
                    <input type="email" placeholder="Enter Your Email">
                </td>
            </tr>
            <tr>
                <td>
                    <label for=""> Mobile Number</label>
                </td>
                <td>
                    <input type="number" placeholder="Enter Your Mobile Number">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Gender</label>
                </td>
                <td>
                    <input type="radio" value="Male" name="gender"/> <label>Male</label>
                    <input type="radio" value="Female" name="gender"/> <label>Female</label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Date of Birth(DOB)</label>
                </td>
                <td>
                    <input type="date" name="txtdob" value=""/>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Address</label>
                </td>
                <td>
                    <textarea name="txtaddress" cols="30" rows="5"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">City</label>
                </td>
                <td>
                    <input type="text" placeholder="GopalGanj"max="50">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Pin Code</label>
                </td>
                <td>
                    <input type="number" placeholder="Pin Code" max="6">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">State</label>
                </td>
                <td>
                    <input type="text" placeholder="State Name" max="50">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Country</label>
                </td>
                <td>
                  <input type="text" placeholder="India" max="40">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Hobbies</label>
                </td>
                <td>
                    <input type="checkbox" name="chk1"/> <label>Drawing</label>
                    <input type="checkbox" name="chk2"/> <label>Singing</label>
                    <input type="checkbox" name="chk3"/> <label>Sketching</label>
                    <input type="checkbox" name="<chk4"/> <label>Dancing</label><br>
                    <input type="checkbox" name="<chk4"/> <label>Others</label><label for=""><input type="text" placeholder="Ex-Teaching" max="50"></label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Qualification</label>
                </td>
                <td>
                    <input type="checkbox" name="chk1"/> <label>High School(10th)</label><br>
                    <input type="checkbox" name="chk1"/><label>Higher School(12th)</label><br>
                    <input type="checkbox" name="chk1"/><label>Graduation(Bachelors)</label><br>
                    <input type="checkbox" name="chk1"/><label>Post Graduation(Masters)</label><br>
                    <input type="checkbox" name="chk1"/><label>Phd</label><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Courses Applied For</label>
                </td>
                <td>
                    <input type="radio" name="r1"/><label>BCA(Bachelor of Computer Applications)</label><br>
                    <input type="radio" name="r1"/><label>B.Com(Bachelor of Commerce)</label><br>
                    <input type="radio" name="r1"/><label>B.Sc(Bachelor of Science)</label><br>
                    <input type="radio" name="r1"/><label>BA(Bachelor of Arts)</label><br>
                    <input type="radio" name="r1"/><label>MCA(Master of Computer Applications)</label><br>
                    <input type="radio" name="r1"/><label>M.Com(Master of Commerce)</label><br>
                    <input type="radio" name="r1"/><label>M.Sc(Master of Science)</label><br>
                    <input type="radio" name="r1"/><label>MA(Master of Arts)</label><br>
                </td>
            </tr>
            <tr align="center">
                <td colspan="2">
                    <input type="submit" value="Submit" name="btn2"/>
                    <input type="reset" value="Reset" name="btn3"/>
                </td>
            </tr>
        </form>
    </table>
    </center>
</body>
</html>
