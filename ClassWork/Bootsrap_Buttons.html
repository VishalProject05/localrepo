<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Different Types Of Button</title>
    <link rel="stylesheet"  type="text/css"  href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
</style>
</head>
<body>
    <div class="container-fluid">
        <h1>Bootstarp button classes example</h1>
        <input class="btn btn-primary" type="button" value="Simple Button"><br><br>
        <input class="btn btn-success" type="button" value="Simple Button"><br><br>
        <input class="btn btn-info" type="button" value="Simple Button"><br><br>
        <input class="btn btn-warning" type="button" value="Simple Button"><br><br>
        <input class="btn btn-danger" type="button" value="Simple Button"><br><br>
        <input class="btn btn-link" type="button" value="Simple Button"><br><br>
        <input class="btn btn-secondary" type="button" value="Simple Button"><br><br>
        <input class="btn btn-dark" type="button" value="Simple Button"><br><br>
        <input class="btn btn-primary" type="button" value="Simple Button"><br><br>

        <h1>Bootstarp button size classes example</h1>
        <input class="btn btn-primary btn-lg" type="button" value="Simple Button"><br><br>
        <input class="btn btn-primary btn-md" type="button" value="Simple Button"><br><br>
        <input class="btn btn-primary btn-sm" type="button" value="Simple Button"><br><br>
        <input class="btn btn-primary btn-xs" type="button" value="Simple Button"><br><br>

        <h1>Bootstarp block level button example</h1>
        <div class="d-grid">
            <input class="btn btn-primary btn-block" type="button" value="Simple Button">
        </div>
    </div>

    <h1>Bootsrap image classes example</h1>
    <img class="m-1 rounded" src="vishal.jpg" width="200px">
    <img class="m-1 rounded-circle" src="vishal.jpg" width="200px">
    <img class="m-1 img-thumbnail" src="vishal.jpg" width="200px">
    <img class="m-1 img-fluid" src="vishal.jpg" width="200px">
</body>
</html>
