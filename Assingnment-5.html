<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
    <style>
        background-color :green;
    </style>
</head>
<body>

    <h2 align="center">USER FORM</h2>

    <form>
        <table>
            <tr>
                <td>FIRST NAME</td>
                <td><input type="text" name="fname"></td>
            </tr>

            <tr>
                <td>PASSWORD</td>
                <td><input type="password" name="password"></td>
            </tr>

            <tr>
                <td>GENDER</td>
                <td>
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                </td>
            </tr>

            <tr>
                <td>ADDRESS</td>
                <td>
                    <textarea name="address" rows="4" cols="25"></textarea>
                </td>
            </tr>

            <tr>
                <td>D.O.B</td>
                <td>
                    <input type="date" name="dob">
                </td>
            </tr>

            <tr>
                <td>SELECT GAMES</td>
                <td>
                    <input type="checkbox" name="games" value="Hockey"> Hockey
                    <input type="checkbox" name="games" value="Football"> Football
                    <input type="checkbox" name="games" value="Cricket"> Cricket
                    <input type="checkbox" name="games" value="Volleyball"> Volleyball
                </td>
            </tr>

            <tr>
                <td>MARITAL STATUS</td>
                <td>
                    <input type="radio" name="marital" value="Married"> Married
                    <input type="radio" name="marital" value="Unmarried"> Unmarried
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="checkbox" name="agree">
                    I accept this agreement
                </td>
            </tr>

            <tr>
                <td>
                    <input type="submit" value="Submit">
                </td>
                <td>
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
